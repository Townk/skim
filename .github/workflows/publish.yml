name: Publish to PyPI

# Sole PyPI-publishing path. Fires on the ``release: published`` event
# that ``gh release create`` emits inside ``just release`` (and on any
# other published GitHub Release / manual dispatch). PyPI's trusted-
# publisher entry for this project must list this exact workflow
# filename — see ``.github/workflows/release.yml``'s header comment
# for the wider flow.

on:
  release:
    types: [published]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
