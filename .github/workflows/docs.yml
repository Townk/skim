name: Deploy Documentation

on:
  push:
    branches:
      - mainline
  release:
    types: [published]
  workflow_dispatch:

# mike pushes to the gh-pages branch — needs write access to the repo,
# not the Pages API. Pages itself must be configured to "Deploy from
# branch" → gh-pages → /(root) in the repository settings.
permissions:
  contents: write

# Serialise so two pushes don't race the same gh-pages branch update.
concurrency:
  group: "docs-deploy"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # mike needs to fetch + push the gh-pages branch alongside
          # whatever ref triggered the workflow.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group docs

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy dev docs (mainline branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/mainline'
        run: uv run mike deploy --push --update-aliases dev mainline

      - name: Deploy versioned docs (release published)
        if: github.event_name == 'release'
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          # Strip leading "v" if present, then keep just major.minor
          # so patch releases overwrite the same docs version (e.g. v0.7.2
          # and v0.7.3 both publish to "0.7"). Adjust the pattern if you'd
          # rather pin docs to full semver.
          VERSION_SHORT=$(echo "${TAG}" | sed -E 's/^v?([0-9]+\.[0-9]+).*/\1/')
          uv run mike deploy --push --update-aliases "$VERSION_SHORT" latest
          uv run mike set-default --push latest

      - name: Deploy on manual trigger (defaults to dev alias)
        if: github.event_name == 'workflow_dispatch'
        run: uv run mike deploy --push --update-aliases dev mainline
