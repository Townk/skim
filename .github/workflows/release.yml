name: Release

on:
  push:
    branches: [ mainline ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.check_tag.outputs.exists == 'false' }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine Release Type and Version
        id: version
        run: |
          python -c "
          import re
          import subprocess
          import os
          import sys

          print('Analyzing version from pyproject.toml...')

          # Read current version
          try:
              with open('pyproject.toml', 'r') as f:
                  content = f.read()
          except FileNotFoundError:
              print('Error: pyproject.toml not found')
              sys.exit(1)

          # Extract version - supports both release (0.4.2) and dev (0.4.2.dev) formats
          version_match = re.search(r'version\s*=\s*\"(\d+)\.(\d+)\.(\d+)(\.dev)?\"', content)
          if not version_match:
              print('Error: Could not find valid version string in pyproject.toml')
              print('Expected format: X.Y.Z or X.Y.Z.dev')
              sys.exit(1)

          major = int(version_match.group(1))
          minor = int(version_match.group(2))
          patch = int(version_match.group(3))
          is_dev = version_match.group(4) is not None

          if is_dev:
              # Pre-release: append commit count to create unique dev version
              print('Detected development version - creating pre-release')
              
              try:
                  # Try to find the last tag to count commits since then
                  last_tag = subprocess.check_output(
                      ['git', 'describe', '--tags', '--abbrev=0'],
                      stderr=subprocess.DEVNULL,
                      text=True
                  ).strip()
                  commits = subprocess.check_output(
                      ['git', 'rev-list', '--count', f'{last_tag}..HEAD'],
                      text=True
                  ).strip()
                  print(f'Counting commits since tag {last_tag}: {commits}')
              except subprocess.CalledProcessError:
                  # No tags found, count all commits
                  commits = subprocess.check_output(
                      ['git', 'rev-list', '--count', 'HEAD'],
                      text=True
                  ).strip()
                  print(f'No tags found. Total commit count: {commits}')

              release_version = f'{major}.{minor}.{patch}.dev{commits}'
              is_prerelease = 'true'
              release_name = f'Pre-release v{release_version}'
              
              # Update pyproject.toml with the full dev version for build
              new_content = re.sub(
                  r'version\s*=\s*\".*\"',
                  f'version = \"{release_version}\"',
                  content,
                  count=1
              )
              with open('pyproject.toml', 'w') as f:
                  f.write(new_content)
          else:
              # Release: use version as-is
              print('Detected release version - creating official release')
              release_version = f'{major}.{minor}.{patch}'
              is_prerelease = 'false'
              release_name = f'Release v{release_version}'

          print(f'Version: {release_version}')
          print(f'Pre-release: {is_prerelease}')
          print(f'Release name: {release_name}')

          if 'GITHUB_OUTPUT' in os.environ:
              with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
                  print(f'version={release_version}', file=fh)
                  print(f'is_prerelease={is_prerelease}', file=fh)
                  print(f'release_name={release_name}', file=fh)
          "

      - name: Check if tag already exists
        id: check_tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG does not exist yet"
          fi

      - name: Build package
        if: steps.check_tag.outputs.exists == 'false'
        run: uv build

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.release_name }}
          draft: false
          prerelease: ${{ steps.version.outputs.is_prerelease == 'true' }}
          make_latest: ${{ steps.version.outputs.is_prerelease == 'false' }}
          files: dist/*
          generate_release_notes: true

      - name: Skip - Tag already exists
        if: steps.check_tag.outputs.exists == 'true'
        run: |
          echo "::notice::Skipping release - tag v${{ steps.version.outputs.version }} already exists"

  publish-package:
    name: Publish to PyPI
    needs: release
    if: needs.release.outputs.released == 'true' && needs.release.outputs.is_prerelease == 'false'
    uses: ./.github/workflows/publish.yml
    permissions:
      contents: read
      id-token: write

