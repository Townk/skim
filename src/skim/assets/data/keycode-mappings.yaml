# Mapping to help resolve macro functions arguments that are modifier bits. The
# `modifier_union` specification is:
#
#   MOD_BITS := MOD |
#               MOD "|" MOD_BITS
#   MOD := `modifier_union` key
#
# In summary, it can be one or more of the keys in this mapping separated by a
# pipe ("|") character.
modifier_union:
  MOD_LCTL: "@@KC_LEFT_CTRL;"
  MOD_LSFT: "@@KC_LEFT_SHIFT;"
  MOD_LALT: "@@KC_LEFT_ALT;"
  MOD_LOPT: "@@KC_LOPT;"
  MOD_LGUI: "@@KC_LEFT_GUI;"
  MOD_LCMD: "@@KC_LCMD;"
  MOD_LWIN: "@@KC_LWIN;"
  MOD_RCTL: "@@KC_RIGHT_CTRL;"
  MOD_RSFT: "@@KC_RIGHT_SHIFT;"
  MOD_RALT: "@@KC_RIGHT_ALT;"
  MOD_ROPT: "@@KC_ROPT;"
  MOD_RGUI: "@@KC_RIGHT_GUI;"
  MOD_RCMD: "@@KC_RCMD;"
  MOD_RWIN: "@@KC_RWIN;"
  MOD_HYPR: "@@KC_LEFT_CTRL; @@KC_LEFT_SHIFT; @@KC_LEFT_ALT; @@KC_LEFT_GUI;"
  MOD_MEH: "@@KC_LEFT_CTRL; @@KC_LEFT_SHIFT; @@KC_LEFT_ALT;"

# The macro_functions mapping describe how keys that are defined by macro
# functions should be displayed. This function can be any kind of macro
# function, from tap-hold to one-shot keys.
#
# In the QMK mapping, these macro functions always have the same format:
#
#   FUNC_NAME(COMMA_SEPARATED_ARGS)
#
# Args in a macro function can be one of three types:
#
# 1. A standard keycode - defined in the `keycodes` mapping in this file.
# 2. A modifier union - one or more modifiers separated by a `|` character.
# 3. Other macro function - this is resolved recursively.
#
# The syntax to describe a macro function is the same as the keycode mapping:
#
#   FUNC_NAME: "a string representing the key label"
#
# Like the `keycodes` mapping, the `macro_functions` mapping have special
# placeholder that are resolved before anything. These placeholders are:
#
# - `|;` (separator) - Resolved to the separator character. This is useful to
#   distinguish between different behaviors the key have.
# - `#N;` (layer arg) - Resolved to a layer number, even when is a layer ID. `N`
#   is the argument index for the function, so `#0;` will resolve by calling the
#   layer ID resolution and passing the first argument of the macro function to
#   it.
# - `@N;` (keycode arg) - Resolved by checking if the arg is an entry in the
#   `keycodes` map and using its value if it is. If it is not, try to resolve it
#   as a `modifier_union` and using the result if it is. If the previous two
#   resolutins failed, pass the argument as is to the standard keycode
#   resolution to allow skim to recursively resolve other macro functions and
#   special cases.
#
# When resolving a macro function, skim will first get the content of the
# `macro_functions` mapping that represents the function being resolved. Then
# it resolves any argument in the string. Onece that part is done, it will send
# the resolved string to the standard keymap resolution function.
#
# For instance, assume the following mapping:
#
#   LT: "%%nf-md-layers_outline; #0;|;@1;"
#
# Now, when the keycode transformer finds the keycode `LT(_NAV, LSFT(KC_1))`, it
# will resolve it to: "󰧾 2│!".
#
# The argument 0 is resolved to the NerdFont symbol "󰧾" followed by a space and
# a layer number (which, in this example, is the second layer defined that has
# the ID `_NAV` representing it).
#
# Then the transformer adds a separator "│", followed by the standard label
# resolution for the `LSFT(KC_1)` keycode, which first gets replaced by
# `@@KC_EXLM;` due to the `reversed_alias` entry, and since the label is not
# fully resolved, it recursively resolve the transformed keycode into `!`.
macro_functions:
  C: "@@KC_LEFT_CTRL; @0;"
  S: "@@KC_LEFT_SHIFT; @0;"
  A: "@@KC_LEFT_ALT; @0;"
  G: "@@KC_LEFT_GUI; @0;"
