  LWIN: "@@KC_LEFT_GUI; @0;"
  LCS: "@@KC_LEFT_CTRL; @@KC_LEFT_SHIFT; @0;"
  LCA: "@@KC_LEFT_CTRL; @@KC_LEFT_ALT; @0;"
  LCG: "@@KC_LEFT_CTRL; @@KC_LEFT_GUI; @0;"
