# Description for keycode functions (used as wrappers). Keyed by the
# function token (the part before the parenthesis). When a key is bound
# to e.g. ``MO(1)``, the function ``MO`` is added to the symbol legend
# alongside whatever its template renders.
function_descriptions:
  Layers:
    # Layer functions only — tap-hold combinations (LT, modifier-tap *_T,
    # generic MT) are intentionally NOT described here. The user can read
    # those keys directly from the rendered tap|hold label.
    #
    # The display symbol is derived automatically from the macro_functions
    # template via the label adapter (``#`` is used as the layer-arg
    # placeholder). No ``symbol`` field is needed here.
    #
    # Descriptions use the same placeholder syntax as macro_functions templates:
    # ``#N;`` → literal layer-arg N (rendered as ``#`` in the legend),
    # ``@N;`` → keycode arg N (rendered as ``#``), ``@@KC;`` → resolved symbol.
    DF: "Default layer to #0;"
    PDF: "Set permanent default layer to #0;"
    MO: "Hold to layer #0;"
    LM: "Hold to layer #0; with $1; pressed"
    OSL: "One-shot layer #0;"
    TG: "Toggle layer #0;"
    TO: "Make #0; the only active layer"
    TT: "Hold to layer #0; / double-tap to toggle"

  Modifiers:
    # One-shot modifier — describes the one-shot mechanic (not tap-hold).
    OSM: "One-shot $0;"

  Tap-dance:
    TD: "Execute tap-dance @0;"
